<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Feedback - Online Restaurant</title>
    <style>
        /* General Body Styles */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1;
            color: #333;
        }

        /* Feedback Container Styles */
        .feedback-container {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 550px;
            margin: 20px;
        }

        /* Heading Styles */
        h2 {
            text-align: center;
            color: #e44d26; /* A vibrant, brand-consistent color */
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 0.5px; /* Improved readability */
        }

        /* Form Styles */
        form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* Label Styles */
        label {
            font-weight: 500;
            color: #555;
            margin-bottom: 5px; /* Added margin */
        }

        /* Input and Textarea Styles */
        input, textarea {
            width: 100%;
            padding: 8px;
            border-radius: 9px;
            border: 2px solid #ddd;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        input:focus, textarea:focus {
            border-color: #e44d26; /* Highlight color on focus */
            outline: none;
            box-shadow: 0 0 5px rgba(228, 77, 38, 0.3); /* Subtle shadow on focus */
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* Button Styles */
        button {
            background-color: #e44d26; /* Consistent brand color */
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px 24px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease; /* Added transform */
            font-weight: 500;
        }

        button:hover {
            background-color: #d13c1e; /* Darker shade on hover */
            transform: translateY(-2px); /* Slight lift effect */
        }

        button:active {
            transform: translateY(0); /* No lift when clicked */
        }

        /* Rating Styles */
        .rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: center;
            margin-bottom: 20px;
        }

        .rating input {
            display: none;
        }

        .rating label {
            font-size: 34px;
            color: #ddd;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .rating label:hover,
        .rating label:hover ~ label,
        .rating input:checked ~ label {
            color: #ffb84d; /* Gold color for rating */
        }

        /* Response Message Styles */
        #responseMessage {
            margin-top: 20px;
            font-weight: 600;
            color: #2ecc71;
            text-align: center;
            display: none;
            padding: 15px;
            background-color: #f0fff5;
            border-radius: 8px;
            border: 1px solid #2ecc71; /* Added border */
        }

        /* Media Query for Responsiveness */
        @media (max-width: 768px) {
            .feedback-container {
                padding: 25px;
                margin: 15px;
            }

            h2 {
                font-size: 28px;
            }

            input, textarea, button {
                padding: 11px;
                font-size: 15px;
            }

            .rating label {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="feedback-container">
        <h2>Customer Feedback</h2>
        <form id="feedbackForm">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Your Name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Your Email" required>

            <label for="phone">Contact Number:</label>
            <input type="tel" id="phone" name="phone" placeholder="Your Contact Number (Optional)">

            <label>Rate Your Experience:</label>
            <div class="rating">
                <input type="radio" id="star5" name="rating" value="5" required /><label for="star5" title="5 stars">★</label>
                <input type="radio" id="star4" name="rating" value="4" required /><label for="star4" title="4 stars">★</label>
                <input type="radio" id="star3" name="rating" value="3" required /><label for="star3" title="3 stars">★</label>
                <input type="radio" id="star2" name="rating" value="2" required /><label for="star2" title="2 stars">★</label>
                <input type="radio" id="star1" name="rating" value="1" required /><label for="star1" title="1 star">★</label>
            </div>

            <label for="comments">Suggestions:</label>
            <textarea id="comments" name="comments" rows="5" placeholder="Share your feedback..." required></textarea>

            <button type="submit">Submit Feedback</button>
        </form>

        <div id="responseMessage" style="margin-top: 15px; font-weight: bold; color: green; display:none;">
            Thank you for your feedback!
        </div>
    </div>

    <script>
        document.getElementById('feedbackForm').addEventListener('submit', function(event) {
            event.preventDefault();

            // Collect form data
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const rating = document.querySelector('input[name="rating"]:checked').value;
            const comments = document.getElementById('comments').value.trim();

            // Simulate data submission to server
            console.log("Feedback Submitted:", { name, email, phone, rating, comments });

            // Show thank you message
            document.getElementById('responseMessage').style.display = 'block';

            // Clear form fields
            document.getElementById('feedbackForm').reset();
        });
    </script>
</body>
</html>
