<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE GOURMET SPOT - Reservations</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
       
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #2b2b2b, #1a1a1a);
            color: #ffffff;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            padding: 1.5rem 0;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(45deg, #ff6b6b, #ff8e53);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: rotate(-5deg);
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            position: relative;
            padding: 0.5rem 0;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 0;
            background: #ff6b6b;
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

       
        .reservations-hero {
            height: 40vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('reservations-bg.jpg') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 80px;
        }

        .reservations-hero h1 {
            font-size: 3rem;
            background: linear-gradient(45deg, #ff6b6b, #ff8e53);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .seat-map-container {
            padding: 4rem 0;
        }

        .seat-map {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 1rem;
            max-width: 800px;
            margin: 2rem auto;
            perspective: 1000px;
        }

        .seat {
            width: 50px;
            height: 50px;
            border-radius: 8px 8px 2px 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            background: #4CAF50;
            transform-style: preserve-3d;
        }

        .seat::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 5px;
            background: #2E7D32;
            border-radius: 0 0 3px 3px;
        }

        .seat.booked {
            background: #f44336;
            cursor: not-allowed;
        }

        .seat.selected {
            background: #FFC107;
            transform: rotateX(45deg) translateZ(10px);
            box-shadow: 0 10px 20px rgba(255, 193, 7, 0.3);
        }

        .booking-form {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 107, 107, 0.2);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
            border-radius: 10px;
            color: white;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            outline: none;
        }

        .submit-btn {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(45deg, #ff6b6b, #ff8e53);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

       
        @media (max-width: 768px) {
            .seat-map {
                grid-template-columns: repeat(5, 1fr);
            }

            .reservations-hero h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    
    <nav class="navbar">
        <div class="container nav-content">
            <div class="logo">THE GOURMET SPOT</div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="menu.html">Menu</a>
                <a href="reservations.html">Reservations</a>
                <a href="contact.html">Contact</a>
                <a href="feedback.html">Feedback</a>
                <a href="giftcard.html">Gift card</a>
            </div>
        </div>
    </nav>

   
    <section class="reservations-hero">
        <h1>Book Your Table</h1>
    </section>

    <div class="seat-map-container">
        <div class="container">
            <h2 class="section-title">Select Your Table</h2>
            <div class="seat-map" id="seatMap">
                
            </div>
        </div>
    </div>

    
    <div class="booking-form">
        <h2>Reservation Details</h2>
        <form id="bookingForm">
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" required>
            </div>
            <div class="form-group">
                <label for="time">Time</label>
                <input type="time" id="time" required>
            </div>
            <div class="form-group">
                <label for="guests">Number of Guests</label>
                <input type="number" id="guests" min="1" required>
            </div>
            <button type="submit" class="submit-btn">Confirm Reservation</button>
        </form>
    </div>

    <script>
       
        const seatMap = document.getElementById('seatMap');
        const totalSeats = 50;
        let selectedSeats = [];

        
        for (let i = 1; i <= totalSeats; i++) {
            const seat = document.createElement('div');
            seat.className = Math.random() < 0.2 ? 'seat booked' : 'seat'; 
            seat.textContent = i;
            seat.addEventListener('click', toggleSeat);
            seatMap.appendChild(seat);
        }


        function toggleSeat(e) {
            const seat = e.target;
            if (!seat.classList.contains('booked')) {
                seat.classList.toggle('selected');
                
                
                const seatNumber = seat.textContent;
                if (seat.classList.contains('selected')) {
                    selectedSeats.push(seatNumber);
                } else {
                    selectedSeats = selectedSeats.filter(num => num !== seatNumber);
                }

         
                seat.style.transform = seat.classList.contains('selected') 
                    ? 'rotateX(45deg) translateZ(15px)'
                    : 'none';
            }
        }

  
        const bookingForm = document.getElementById('bookingForm');
        bookingForm.addEventListener('submit', (e) => {
            e.preventDefault();

            if (selectedSeats.length === 0) {
                alert('Please select at least one seat.');
                return;
            }

           
            selectedSeats.forEach(seatNumber => {
                const seat = Array.from(seatMap.children).find(seat => seat.textContent === seatNumber);
                if (seat) {
                    seat.classList.remove('selected');
                    seat.classList.add('booked');
                    seat.style.transform = 'none'; // Reset 3D effect
                    seat.style.backgroundColor = '#f44336'; // Red color for booked seats
                    seat.style.cursor = 'not-allowed'; // Disable further clicks
                }
            });

            // Show confirmation message
            alert(`Reservation confirmed for seat(s): ${selectedSeats.join(', ')}. We look forward to seeing you!`);

            // Reset form and selected seats
            bookingForm.reset();
            selectedSeats = [];
        });
    </script>
</body>
</html>
